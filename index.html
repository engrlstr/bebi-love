<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For My Darling 💜</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eafaf5, #f3e6ff);
  cursor: url('cursor.cur'), auto;
}

* { box-sizing: border-box; }

.heart {
  position: absolute;
  color: rgba(170, 120, 200, 0.5);
  font-size: 18px;
  animation: float 6s linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

.center-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
  max-width: 90vw;
}

input, button {
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  border: none;
}

button {
  background: #cdb4db;
  color: white;
  cursor: pointer;
}

#mainPage {
  display: none;
  width: 100vw;
  height: 100vh;
  position: relative;
  z-index: 2;
}

.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  height: 100vh;
  width: 180px;
  background: rgba(255,255,255,0.4);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
  z-index: 3;
}

.sidebar button { width: 140px; }

.content {
  margin-left: 180px;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.content-box {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 600px;
  text-align: center;
}

.song { margin: 10px 0; padding: 10px; background: #f7f0ff; border-radius: 10px; }
.song-title { font-weight: bold; }
audio { width: 100%; }

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.gallery-grid img {
  width: 100%;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s;
}
.gallery-grid img:hover {
  transform: scale(1.05);
}

.notes { text-align:left; line-height:1.8; }

.proposal-box { position: relative; height: 160px; }
#noBtn { position: absolute; }

#cinematic {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(135deg,#e6ccff,#f3e6ff);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  z-index: 9999;
}

canvas { position: fixed; top:0; left:0; pointer-events:none; }

#lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 99999;
}
#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 15px;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div id="login" class="center-box">
  <h2>💜 Enter Secret Code</h2>
  <input id="code" type="password" placeholder="Enter code" />
  <button id="enterBtn">Enter</button>
</div>

<div id="welcome" class="center-box" style="display:none;">
  <h2>Welcome baby 💜</h2>
</div>

<div id="mainPage">

  <div class="sidebar">
    <button onclick="show('letter')">💌 Love Letter</button>
    <button onclick="show('music')">🎵 Music</button>
    <button onclick="show('notes')">📝 Notes</button>
    <button onclick="show('gallery')">📸 Gallery</button>
    <button onclick="show('proposal')">💍 Question</button>
  </div>

  <div class="content">

    <div id="letter" class="content-box">
      <h2>Love Letter 💜</h2>
      <p id="typewriter"></p>
    </div>

    <div id="music" class="content-box" style="display:none;">
      <h2>Songs 🎵</h2>
    </div>

    <div id="notes" class="content-box" style="display:none;">
      <h2>Notes 📝</h2>
      <div class="notes">Take care always 💜</div>
    </div>

    <div id="gallery" class="content-box" style="display:none;">
      <h2>Gallery 📸</h2>
      <div class="gallery-grid">
        <img src="images/img1.jpg" onclick="openLightbox(this)">
      </div>
    </div>

    <div id="proposal" class="content-box" style="display:none;">
      <h2>Will you be my girlfriend? 💍</h2>
      <div class="proposal-box">
        <button onclick="yes()">Yes 💜</button>
        <button id="noBtn" onmouseover="runNo()">No 🤍</button>
      </div>
    </div>

  </div>
</div>

<div id="cinematic">
  <h1>She said YES 💜</h1>
</div>

<div id="lightbox">
  <img id="lightbox-img">
</div>

<script>

// START DATE (EDIT THIS)
const startDate = new Date("2026-05-05");

function getDayNumber(){
  const today = new Date();
  const diff = today - startDate;
  return Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
}

const unlockDays = {
  letter: 3,
  notes: 2,
  gallery: 1,
  proposal: 4
};

// HEARTS
for(let i=0;i<25;i++){
  let h=document.createElement('div');
  h.className='heart';
  h.innerHTML='💜';
  h.style.left=Math.random()*100+'vw';
  h.style.animationDuration=(3+Math.random()*3)+'s';
  document.body.appendChild(h);
}

// SHOW FUNCTION WITH LOCK
function show(id){
  const currentDay = getDayNumber();

  if(unlockDays[id] && currentDay < unlockDays[id]){
    document.querySelectorAll('.content-box').forEach(x=>x.style.display='none');

    const box = document.getElementById('letter');
    box.style.display = 'block';
    box.innerHTML = `
      <h2>💜 Locked</h2>
      <p>Come back soon love... unlocks in ${unlockDays[id] - currentDay} day(s) 💜</p>
    `;
    return;
  }

  document.querySelectorAll('.content-box').forEach(x=>x.style.display='none');
  document.getElementById(id).style.display='block';
}

// LOGIN
function start(){
  if(document.getElementById('code').value==='darling'){
    login.style.display='none';
    welcome.style.display='block';
    setTimeout(()=>{
      welcome.style.display='none';
      mainPage.style.display='block';
      type();
    },2000);
  }
}

enterBtn.onclick = start;

// TYPEWRITER
function type(){
  const text="Hi love, you are my forever 💜";
  let i=0;
  function t(){
    if(i<text.length){
      typewriter.innerHTML+=text[i++];
      setTimeout(t,40);
    }
  }
  t();
}

// LIGHTBOX
function openLightbox(img){
  lightbox.style.display='flex';
  lightbox-img.src=img.src;
}
lightbox.onclick=()=>lightbox.style.display='none';

// NO BUTTON
function runNo(){
  noBtn.style.left=Math.random()*200+'px';
  noBtn.style.top=Math.random()*120+'px';
}

// YES
function yes(){
  cinematic.style.display='flex';
}

</script>

</body>
</html>
